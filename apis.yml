- aid: fasten-health:fasten-connect-webhooks
  name: Fasten Connect Webhooks
  description: Fasten Connect emits HMAC-verified webhook events to notify integrators of asynchronous
    operations such as EHI export completion, connection lifecycle changes, and TEFCA workflow updates.
    Documentation covers event types, delivery semantics with retries, signature verification, and a webhook
    debugging simulator for local development.

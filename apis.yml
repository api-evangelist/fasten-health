- aid: fasten-health:fasten-stitch
  name: Fasten Stitch Client SDKs
  description: Stitch is Fasten Connect's client-side embeddable component that lets a patient pick their
    healthcare provider, authenticate, and grant data-sharing consent inside a host application. Stitch is shipped
    as three SDKs — a framework-neutral Web Component, a React SDK, and a React Native SDK — each with quickstart
    and reference docs. Client events stream connection lifecycle, error, and consent signals back to the host
    app. The Stitch element source repos (fasten-stitch-element-react, fasten-stitch-element-react-native) are
    MIT-licensed on GitHub with companion playground apps.
  humanURL: https://docs.connect.fastenhealth.com/stitch/v4/introduction

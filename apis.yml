- aid: fasten-health:fasten-connect
  name: Fasten Connect API
  description: Fasten Connect is the commercial REST + FHIR API for retrieving patient clinical records from
    50,000+ U.S. healthcare systems. The API surface is documented in OpenAPI 1.0.11 at
    api.connect.fastenhealth.com/v1 and uses HTTP Basic authentication with public/private key pairs prefixed
    public_test_/private_test_ or public_live_/private_live_. Capabilities include catalog discovery (search
    brands, fetch organization metadata, brand logos, bulk catalog export), patient-to-provider connection
    orchestration via the /bridge/connect and /bridge/reconnect endpoints, organization-connection status checks,
    bulk EHI (Electronic Health Information) export requests with task polling and signed downloads, TEFCA
    synthetic-patient revocation for testing, and a support-ticket endpoint.
  humanURL: https://docs.connect.fastenhealth.com/api-reference/introduction
  baseURL: https://api.connect.fastenhealth.com/v1

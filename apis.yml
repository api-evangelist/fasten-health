apis:
- aid: fasten-health:fasten-onprem
  name: Fasten OnPrem
  description: Fasten OnPrem is an open-source, self-hosted, personal and family electronic medical record
    manager written in Go (47%) and TypeScript (35%). It runs as a Docker container behind HTTPS/TLS, supports
    multi-user family accounts with admin and viewer roles, and ingests medical data either through manual entry
    or by importing FHIR Bundles. It ships condition-specific dashboards and diagnostic test tracking, with
    planned vaccination-recommendation, conversational medical-history, and wearable-integration features.
    Distributed under GPL-3.0 with 2.7k+ stars; the official container image is hosted at
    ghcr.io/fastenhealth/fasten-onprem.
  humanURL: https://github.com/fastenhealth/fasten-onprem

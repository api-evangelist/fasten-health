- aid: fasten-health:fasten-identity-proofing
  name: Fasten Identity Proofing & TEFCA IAS
  description: Identity proofing endpoints and guides cover Fasten-issued identity verification as well as a
    Bring Your Own Identity path for integrators that already meet NIST IAL2 / TEFCA IAS requirements.
    Documentation includes a TEFCA Individual Access Services developer guide and patient consent + data
    collection guidance for HIPAA-aligned implementations.

aid: fasten-health
name: Fasten Health
description: Fasten Health is a healthcare data interoperability company offering a unified medical record
  platform that gives patients and developers access to clinical data across the U.S. healthcare system. Fasten
  began as an open-source project — Fasten OnPrem, a self-hosted personal/family electronic medical record manager
  that ingests FHIR Bundles and is distributed under GPL-3.0 with 2.7k+ GitHub stars. The team then productized
  the connectivity layer as Fasten Connect, a commercial REST + FHIR API and Stitch client SDK suite that lets
  developers retrieve clinical records from 50,000+ healthcare systems and 60,000+ organizations including Epic,
  Cerner, MyChart, Kaiser Permanente, HCA, Ascension, Humana, and Medicare. Founded by engineers who lived through
  the fragmentation of health data firsthand and based in New York City, Fasten ships GPL/MIT/Apache 2.0 open
  source repos alongside the hosted Fasten Connect platform.
